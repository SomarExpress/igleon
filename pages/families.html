<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#4f46e5">
<title>Familias · ADULAM</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<link rel="stylesheet" href="../assets/styles.css">
</head>
<body class="bg-slate-50 min-h-screen flex">
<div id="app" class="flex flex-1"></div>
<script src="../js/config.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/ui.js"></script>
<script>
(async function() {
  if (!(await Auth.requireAuth())) return;
  document.getElementById('app').innerHTML = UI.renderLayout('Familias');
  Auth.applyRoleVisibility();
  UI.refreshIcons();

  document.getElementById('pageContent').innerHTML = `
    <div class="flex gap-3 mb-5">
      <button onclick="crearFamilia()" data-roles="pastor,lider,servidor" class="px-5 py-3 bg-indigo-600 hover:bg-indigo-700 active:scale-95 text-white font-semibold rounded-xl flex items-center gap-2">
        <i data-lucide="plus" class="w-5 h-5"></i>Nueva familia
      </button>
    </div>
    <div id="grid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
  `;
  UI.refreshIcons();
  await cargar();
})();

async function cargar() {
  const { data: fams } = await supabase.from('families').select('*').order('nombre_familia');
  const { data: miembros } = await supabase.from('members').select('id, nombre, familia_id');
  const grid = document.getElementById('grid');
  if (!fams || fams.length === 0) {
    grid.innerHTML = `<div class="col-span-full text-center py-12 text-slate-400">
      <i data-lucide="home" class="w-12 h-12 mx-auto mb-3 opacity-40"></i>
      <p>Sin familias registradas.</p>
    </div>`;
    UI.refreshIcons();
    return;
  }
  grid.innerHTML = fams.map(f => {
    const integrantes = (miembros||[]).filter(m => m.familia_id === f.id);
    return `
      <div class="bg-white rounded-2xl border border-slate-200 p-5 hover:shadow-md transition">
        <div class="flex items-start justify-between mb-3">
          <div class="flex items-center gap-2">
            <div class="w-10 h-10 rounded-xl bg-indigo-100 text-indigo-700 flex items-center justify-center">
              <i data-lucide="home" class="w-5 h-5"></i>
            </div>
            <h4 class="font-bold text-slate-800">${f.nombre_familia}</h4>
          </div>
          <button onclick="eliminarFamilia('${f.id}','${f.nombre_familia.replace(/'/g,"\\'")}')" data-roles="pastor" class="p-1.5 text-red-600 hover:bg-red-100 rounded-lg">
            <i data-lucide="trash-2" class="w-4 h-4"></i>
          </button>
        </div>
        <p class="text-xs text-slate-500 mb-3">${integrantes.length} integrante${integrantes.length!==1?'s':''}</p>
        <div class="space-y-1">
          ${integrantes.slice(0,5).map(m => `<div class="text-sm text-slate-700 flex items-center gap-1.5"><i data-lucide="user" class="w-3 h-3 text-slate-400"></i>${m.nombre}</div>`).join('')}
          ${integrantes.length>5 ? `<div class="text-xs text-slate-400 pl-4">+${integrantes.length-5} más</div>` : ''}
        </div>
      </div>`;
  }).join('');
  UI.refreshIcons();
  Auth.applyRoleVisibility();
}

async function crearFamilia() {
  const nombre = prompt('Nombre de la familia:');
  if (!nombre) return;
  const { error } = await supabase.from('families').insert({ nombre_familia: nombre });
  if (error) UI.toast(error.message, 'error');
  else { UI.toast('Familia creada', 'success'); cargar(); }
}

async function eliminarFamilia(id, nombre) {
  if (!confirm(`¿Eliminar "${nombre}"?`)) return;
  const { error } = await supabase.from('families').delete().eq('id', id);
  if (error) UI.toast(error.message, 'error');
  else { UI.toast('Eliminada', 'success'); cargar(); }
}

window.crearFamilia = crearFamilia;
window.eliminarFamilia = eliminarFamilia;
</script>
</body>
</html>
