<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#4f46e5">
<title>Automatización · ADULAM</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<link rel="stylesheet" href="../assets/styles.css">
</head>
<body class="bg-slate-50 min-h-screen flex">
<div id="app" class="flex flex-1"></div>
<script src="../js/config.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/ui.js"></script>
<script>
(async function() {
  if (!(await Auth.requireAuth())) return;
  if (!Auth.hasRole(['pastor','lider'])) {
    document.body.innerHTML = `<div class="min-h-screen flex items-center justify-center p-4">
      <div class="bg-white rounded-2xl border p-8 text-center max-w-md">
        <i data-lucide="lock" class="w-12 h-12 mx-auto text-red-500 mb-3"></i>
        <h3 class="text-lg font-bold">Sin acceso</h3>
      </div></div>`;
    lucide.createIcons(); return;
  }
  document.getElementById('app').innerHTML = UI.renderLayout('Automatizaciones');
  Auth.applyRoleVisibility();
  UI.refreshIcons();

  document.getElementById('pageContent').innerHTML = `
    <div class="bg-indigo-50 border border-indigo-200 rounded-2xl p-5 mb-5 flex items-start gap-3">
      <div class="w-10 h-10 rounded-xl bg-indigo-600 text-white flex items-center justify-center flex-shrink-0">
        <i data-lucide="zap" class="w-5 h-5"></i>
      </div>
      <div>
        <h3 class="font-bold text-indigo-900">Reglas automáticas</h3>
        <p class="text-sm text-indigo-800 mt-0.5">Estas reglas están listas para conectarse con BuilderBot + WhatsApp. Por ahora generan alertas internas.</p>
      </div>
    </div>

    <div class="grid gap-3 mb-6">
      <div class="bg-white rounded-2xl border border-slate-200 p-4 sm:p-5 flex items-center gap-3 sm:gap-4">
        <div class="w-12 h-12 rounded-xl bg-slate-100 text-slate-600 flex items-center justify-center flex-shrink-0">
          <i data-lucide="user-minus" class="w-6 h-6"></i>
        </div>
        <div class="flex-1 min-w-0">
          <h4 class="font-bold">Inactividad automática</h4>
          <p class="text-xs sm:text-sm text-slate-500">Marca inactivo tras 3 faltas seguidas.</p>
        </div>
        <button onclick="ejecutar('auto_mark_inactive')" class="px-3 sm:px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-sm rounded-lg font-medium flex items-center gap-1.5">
          <i data-lucide="play" class="w-3.5 h-3.5"></i>Ejecutar
        </button>
      </div>

      <div class="bg-white rounded-2xl border border-slate-200 p-4 sm:p-5 flex items-center gap-3 sm:gap-4">
        <div class="w-12 h-12 rounded-xl bg-amber-100 text-amber-700 flex items-center justify-center flex-shrink-0">
          <i data-lucide="alert-triangle" class="w-6 h-6"></i>
        </div>
        <div class="flex-1 min-w-0">
          <h4 class="font-bold">Sin discipulador</h4>
          <p class="text-xs sm:text-sm text-slate-500">Detecta miembros sin asignación.</p>
        </div>
        <button onclick="ejecutar('auto_alert_sin_discipulador')" class="px-3 sm:px-4 py-2 bg-amber-600 hover:bg-amber-700 text-white text-sm rounded-lg font-medium flex items-center gap-1.5">
          <i data-lucide="play" class="w-3.5 h-3.5"></i>Ejecutar
        </button>
      </div>

      <div class="bg-white rounded-2xl border border-slate-200 p-4 sm:p-5 flex items-center gap-3 sm:gap-4">
        <div class="w-12 h-12 rounded-xl bg-emerald-100 text-emerald-700 flex items-center justify-center flex-shrink-0">
          <i data-lucide="message-circle" class="w-6 h-6"></i>
        </div>
        <div class="flex-1 min-w-0">
          <h4 class="font-bold">Mensaje WhatsApp a nuevos</h4>
          <p class="text-xs sm:text-sm text-slate-500">Simula envío a miembros nuevos.</p>
        </div>
        <button onclick="simularEnvio()" class="px-3 sm:px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white text-sm rounded-lg font-medium flex items-center gap-1.5">
          <i data-lucide="send" class="w-3.5 h-3.5"></i>Generar
        </button>
      </div>
    </div>

    <h3 class="text-lg font-bold mb-3 flex items-center gap-2">
      <i data-lucide="history" class="w-5 h-5 text-slate-500"></i>Historial de alertas
    </h3>
    <div id="logs" class="space-y-2"></div>
  `;
  UI.refreshIcons();
  await cargarLogs();
})();

async function ejecutar(nombreFuncion) {
  UI.toast('Ejecutando...', 'info');
  const { error } = await supabase.rpc(nombreFuncion);
  if (error) UI.toast('Error: ' + error.message, 'error');
  else { UI.toast('Ejecutado','success'); cargarLogs(); }
}

async function simularEnvio() {
  const { data: nuevos } = await supabase.from('members').select('id, nombre, telefono').eq('estado_espiritual','nuevo');
  if (!nuevos || nuevos.length === 0) { UI.toast('No hay miembros nuevos','info'); return; }
  const logs = nuevos.map(m => ({
    tipo: 'nuevo_miembro', member_id: m.id,
    mensaje: `[WhatsApp simulado] Hola ${m.nombre}, te damos la bienvenida a ADULAM.`,
    enviado: false
  }));
  const { error } = await supabase.from('automation_logs').insert(logs);
  if (error) UI.toast(error.message,'error');
  else { UI.toast(`${logs.length} mensajes generados`,'success'); cargarLogs(); }
}

async function cargarLogs() {
  const { data } = await supabase.from('automation_logs')
    .select('*, members(nombre, telefono)')
    .order('created_at',{ascending:false}).limit(30);

  const cont = document.getElementById('logs');
  if (!data || data.length === 0) {
    cont.innerHTML = `<div class="bg-white rounded-2xl border p-8 text-center text-slate-400">
      <i data-lucide="inbox" class="w-10 h-10 mx-auto mb-2 opacity-40"></i>
      <p>Sin alertas registradas.</p>
    </div>`;
    UI.refreshIcons(); return;
  }

  const iconos = { inactividad:'user-minus', sin_discipulador:'alert-triangle', nuevo_miembro:'sparkles' };
  cont.innerHTML = data.map(l => `
    <div class="bg-white border border-slate-200 rounded-xl p-3 flex items-start gap-3">
      <div class="w-9 h-9 rounded-lg bg-slate-100 text-slate-600 flex items-center justify-center flex-shrink-0">
        <i data-lucide="${iconos[l.tipo]||'bell'}" class="w-4 h-4"></i>
      </div>
      <div class="flex-1 min-w-0">
        <div class="text-sm text-slate-700">${l.mensaje}</div>
        <div class="text-xs text-slate-400 flex flex-wrap gap-x-3 gap-y-0.5 mt-1">
          <span class="flex items-center gap-1"><i data-lucide="calendar" class="w-3 h-3"></i>${UI.fecha(l.created_at)}</span>
          ${l.members ? `<span class="flex items-center gap-1"><i data-lucide="user" class="w-3 h-3"></i>${l.members.nombre}</span>`:''}
          ${l.members?.telefono ? `<span class="flex items-center gap-1"><i data-lucide="phone" class="w-3 h-3"></i>${l.members.telefono}</span>`:''}
        </div>
      </div>
      <div class="flex flex-col items-end gap-1 flex-shrink-0">
        <span class="text-xs ${l.enviado?'text-emerald-600':'text-amber-600'} flex items-center gap-1">
          <i data-lucide="${l.enviado?'check-circle-2':'clock'}" class="w-3.5 h-3.5"></i>${l.enviado?'Enviado':'Pendiente'}
        </span>
        ${!l.enviado ? `<button onclick="marcarEnviado('${l.id}')" class="text-xs px-2 py-1 bg-emerald-100 text-emerald-700 rounded">Marcar</button>`:''}
      </div>
    </div>
  `).join('');
  UI.refreshIcons();
}

async function marcarEnviado(id) {
  const { error } = await supabase.from('automation_logs').update({ enviado: true }).eq('id', id);
  if (error) UI.toast(error.message,'error');
  else cargarLogs();
}

window.ejecutar = ejecutar;
window.simularEnvio = simularEnvio;
window.marcarEnviado = marcarEnviado;
</script>
</body>
</html>
