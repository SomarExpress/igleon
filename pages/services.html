<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#4f46e5">
<title>Servicios · ADULAM</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<link rel="stylesheet" href="../assets/styles.css">
<style>.flyer { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); }</style>
</head>
<body class="bg-slate-50 min-h-screen flex">
<div id="app" class="flex flex-1"></div>
<script src="../js/config.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/ui.js"></script>
<script>
let miembrosCache = [];
let tiposCache = [];

(async function() {
  if (!(await Auth.requireAuth())) return;
  document.getElementById('app').innerHTML = UI.renderLayout('Servicios');
  Auth.applyRoleVisibility();
  UI.refreshIcons();

  document.getElementById('pageContent').innerHTML = `
    <div class="flex flex-wrap gap-2 mb-5 no-print">
      <button onclick="nuevoPlan()" data-roles="pastor,lider" class="px-4 py-2.5 bg-amber-600 hover:bg-amber-700 active:scale-95 text-white font-semibold rounded-xl flex items-center gap-2">
        <i data-lucide="plus" class="w-4 h-4"></i>Planificar servicio
      </button>
      <button onclick="gestionarTipos()" data-roles="pastor,lider" class="px-4 py-2.5 bg-slate-200 hover:bg-slate-300 rounded-xl font-semibold flex items-center gap-2">
        <i data-lucide="settings" class="w-4 h-4"></i>Tipos de reunión
      </button>
    </div>
    <div id="planes" class="space-y-4"></div>
  `;

  const [miembros, tipos] = await Promise.all([
    supabase.from('members').select('id, nombre').order('nombre'),
    supabase.from('meeting_types').select('*').eq('activo', true).order('orden')
  ]);
  miembrosCache = miembros.data || [];
  tiposCache = tipos.data || [];
  UI.refreshIcons();
  await cargar();
})();

async function cargar() {
  const { data } = await supabase.from('service_plans')
    .select('*, meeting_types(codigo, nombre, icono)')
    .order('fecha',{ascending:false}).limit(20);

  const cont = document.getElementById('planes');
  if (!data || data.length === 0) {
    cont.innerHTML = `<div class="text-center py-12 text-slate-400">
      <i data-lucide="calendar-days" class="w-12 h-12 mx-auto mb-3 opacity-40"></i>
      <p>Sin planes registrados.</p>
    </div>`;
    UI.refreshIcons(); return;
  }

  const planesHTML = await Promise.all(data.map(async p => {
    const { data: tasks } = await supabase.from('service_tasks')
      .select('*, members(nombre)').eq('service_plan_id', p.id).order('created_at');
    const pend = (tasks||[]).filter(t => t.estado==='pendiente');
    const proc = (tasks||[]).filter(t => t.estado==='en_proceso');
    const comp = (tasks||[]).filter(t => t.estado==='completado');

    const tipoNombre = p.meeting_types?.nombre || p.tipo_reunion;
    const tipoIcono  = p.meeting_types?.icono  || '⛪';

    const columna = (titulo, color, icono, items) => `
      <div class="flex-1 min-w-[220px]">
        <div class="font-semibold text-${color}-700 mb-2 flex items-center gap-1.5 text-sm">
          <i data-lucide="${icono}" class="w-4 h-4"></i>${titulo} (${items.length})
        </div>
        <div class="space-y-2">
          ${items.map(t => `
            <div class="bg-white border border-${color}-200 rounded-xl p-3 text-sm">
              <div class="font-medium">${t.nombre_tarea}</div>
              <div class="text-xs text-slate-500 flex items-center gap-1 mt-0.5">
                <i data-lucide="user" class="w-3 h-3"></i>${t.members?.nombre||'Sin asignar'}
              </div>
              <div class="flex gap-1 mt-2 no-print">
                ${t.estado!=='pendiente' ? `<button onclick="cambiarEstado('${t.id}','pendiente')" class="text-xs px-2 py-1 bg-slate-100 rounded" title="Pendiente"><i data-lucide="pause" class="w-3 h-3"></i></button>`:''}
                ${t.estado!=='en_proceso' ? `<button onclick="cambiarEstado('${t.id}','en_proceso')" class="text-xs px-2 py-1 bg-amber-100 rounded" title="En proceso"><i data-lucide="play" class="w-3 h-3"></i></button>`:''}
                ${t.estado!=='completado' ? `<button onclick="cambiarEstado('${t.id}','completado')" class="text-xs px-2 py-1 bg-emerald-100 rounded" title="Completar"><i data-lucide="check" class="w-3 h-3"></i></button>`:''}
                <button onclick="eliminarTarea('${t.id}')" class="text-xs px-2 py-1 bg-red-100 rounded ml-auto" title="Eliminar"><i data-lucide="trash-2" class="w-3 h-3"></i></button>
              </div>
            </div>`).join('') || `<p class="text-xs text-slate-400 italic">Vacío</p>`}
        </div>
      </div>`;

    return `
      <div class="bg-white rounded-2xl border border-slate-200 p-4 sm:p-5">
        <div class="flex items-start justify-between mb-4 flex-wrap gap-2">
          <div class="min-w-0 flex-1">
            <h4 class="text-base sm:text-lg font-bold text-slate-800">${tipoIcono} ${UI.fecha(p.fecha)} · ${tipoNombre}</h4>
            ${p.tema ? `<p class="text-sm text-slate-500 mt-0.5 flex items-center gap-1"><i data-lucide="book-open" class="w-3.5 h-3.5"></i>${p.tema}</p>`:''}
            ${p.predicador ? `<p class="text-sm text-slate-500 flex items-center gap-1"><i data-lucide="mic" class="w-3.5 h-3.5"></i>${p.predicador}</p>`:''}
          </div>
          <div class="flex gap-1 no-print">
            <button onclick="verResumen('${p.id}')" class="px-3 py-1.5 bg-indigo-600 hover:bg-indigo-700 text-white text-sm rounded-lg font-medium flex items-center gap-1">
              <i data-lucide="share-2" class="w-3.5 h-3.5"></i><span class="hidden sm:inline">Compartir</span>
            </button>
            <button onclick="agregarTarea('${p.id}')" data-roles="pastor,lider,servidor" class="px-3 py-1.5 bg-amber-600 hover:bg-amber-700 text-white text-sm rounded-lg font-medium flex items-center gap-1">
              <i data-lucide="plus" class="w-3.5 h-3.5"></i><span class="hidden sm:inline">Tarea</span>
            </button>
            <button onclick="eliminarPlan('${p.id}')" data-roles="pastor" class="px-3 py-1.5 bg-red-100 hover:bg-red-200 text-red-700 text-sm rounded-lg">
              <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
            </button>
          </div>
        </div>
        <div class="flex gap-3 overflow-x-auto pb-2 -mx-1 px-1">
          ${columna('Pendiente','slate','clock',pend)}
          ${columna('En proceso','amber','loader',proc)}
          ${columna('Completado','emerald','check-circle-2',comp)}
        </div>
      </div>`;
  }));

  cont.innerHTML = planesHTML.join('');
  UI.refreshIcons();
  Auth.applyRoleVisibility();
}

function nuevoPlan() {
  const tiposOpts = tiposCache.map(t => `<option value="${t.id}">${t.icono} ${t.nombre}</option>`).join('');
  UI.openModal('mp', `
    <div class="sticky top-0 bg-white border-b border-slate-200 p-4 flex items-center justify-between z-10">
      <h3 class="text-lg font-bold">Nuevo plan</h3>
      <button onclick="UI.closeModal('mp')" class="p-2 hover:bg-slate-100 rounded-lg"><i data-lucide="x" class="w-5 h-5"></i></button>
    </div>
    <form id="pForm" class="p-4 space-y-3">
      <div>
        <label class="text-sm font-medium text-slate-700">Fecha *</label>
        <input name="fecha" type="date" required value="${new Date().toISOString().slice(0,10)}" class="w-full mt-1 px-3 py-2.5 border border-slate-300 rounded-lg">
      </div>
      <div>
        <label class="text-sm font-medium text-slate-700">Tipo de reunión *</label>
        <select name="meeting_type_id" required class="w-full mt-1 px-3 py-2.5 border border-slate-300 rounded-lg">${tiposOpts}</select>
      </div>
      <div>
        <label class="text-sm font-medium text-slate-700">Tema</label>
        <input name="tema" class="w-full mt-1 px-3 py-2.5 border border-slate-300 rounded-lg">
      </div>
      <div>
        <label class="text-sm font-medium text-slate-700">Predicador / Ministrante</label>
        <input name="predicador" class="w-full mt-1 px-3 py-2.5 border border-slate-300 rounded-lg">
      </div>
      <div class="flex gap-2 pt-2">
        <button type="button" onclick="UI.closeModal('mp')" class="flex-1 py-3 bg-slate-100 rounded-xl font-medium">Cancelar</button>
        <button type="submit" class="flex-1 py-3 bg-amber-600 hover:bg-amber-700 text-white rounded-xl font-semibold flex items-center justify-center gap-2">
          <i data-lucide="save" class="w-4 h-4"></i>Crear
        </button>
      </div>
    </form>
  `);
  document.getElementById('pForm').onsubmit = async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const tipoId = fd.get('meeting_type_id');
    const tipoCodigo = tiposCache.find(t => t.id === tipoId)?.codigo || 'especial';
    const { error } = await supabase.from('service_plans').insert({
      fecha: fd.get('fecha'), meeting_type_id: tipoId, tipo_reunion: tipoCodigo,
      tema: fd.get('tema') || null, predicador: fd.get('predicador') || null
    });
    if (error) UI.toast(error.message,'error');
    else { UI.toast('Plan creado','success'); UI.closeModal('mp'); cargar(); }
  };
}

function agregarTarea(planId) {
  const opts = miembrosCache.map(m => `<option value="${m.id}">${m.nombre}</option>`).join('');
  UI.openModal('mt', `
    <div class="sticky top-0 bg-white border-b border-slate-200 p-4 flex items-center justify-between z-10">
      <h3 class="text-lg font-bold">Nueva tarea</h3>
      <button onclick="UI.closeModal('mt')" class="p-2 hover:bg-slate-100 rounded-lg"><i data-lucide="x" class="w-5 h-5"></i></button>
    </div>
    <form id="tForm" class="p-4 space-y-3">
      <div>
        <label class="text-sm font-medium text-slate-700">Tarea *</label>
        <input name="nombre_tarea" required list="sugerencias" class="w-full mt-1 px-3 py-2.5 border border-slate-300 rounded-lg" placeholder="Ej: Abrir iglesia, alabanza...">
        <datalist id="sugerencias">
          <option>Abrir iglesia</option><option>Aseo del templo</option>
          <option>Alabanza</option><option>Sonido</option><option>Proyección</option>
          <option>Ujieres</option><option>Ofrenda</option><option>Cierre</option>
          <option>Predicación</option><option>Oración de apertura</option>
        </datalist>
      </div>
      <div>
        <label class="text-sm font-medium text-slate-700">Responsable</label>
        <select name="responsable_id" class="w-full mt-1 px-3 py-2.5 border border-slate-300 rounded-lg">
          <option value="">Sin responsable</option>${opts}
        </select>
      </div>
      <div class="flex gap-2 pt-2">
        <button type="button" onclick="UI.closeModal('mt')" class="flex-1 py-3 bg-slate-100 rounded-xl font-medium">Cancelar</button>
        <button type="submit" class="flex-1 py-3 bg-amber-600 hover:bg-amber-700 text-white rounded-xl font-semibold flex items-center justify-center gap-2">
          <i data-lucide="save" class="w-4 h-4"></i>Agregar
        </button>
      </div>
    </form>
  `);
  document.getElementById('tForm').onsubmit = async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const { error } = await supabase.from('service_tasks').insert({
      service_plan_id: planId, nombre_tarea: fd.get('nombre_tarea'),
      responsable_id: fd.get('responsable_id') || null
    });
    if (error) UI.toast(error.message,'error');
    else { UI.toast('Agregada','success'); UI.closeModal('mt'); cargar(); }
  };
}

async function cambiarEstado(id, estado) {
  const { error } = await supabase.from('service_tasks').update({ estado }).eq('id', id);
  if (error) UI.toast(error.message,'error'); else cargar();
}

async function eliminarTarea(id) {
  if (!confirm('¿Eliminar tarea?')) return;
  const { error } = await supabase.from('service_tasks').delete().eq('id', id);
  if (error) UI.toast(error.message,'error'); else cargar();
}

async function eliminarPlan(id) {
  if (!confirm('¿Eliminar todo el plan?')) return;
  const { error } = await supabase.from('service_plans').delete().eq('id', id);
  if (error) UI.toast(error.message,'error');
  else { UI.toast('Eliminado','success'); cargar(); }
}

async function verResumen(planId) {
  const { data: p } = await supabase.from('service_plans').select('*, meeting_types(nombre, icono)').eq('id', planId).single();
  const { data: tasks } = await supabase.from('service_tasks').select('*, members(nombre)').eq('service_plan_id', planId).order('created_at');

  const fechaFormato = new Date(p.fecha + 'T12:00:00').toLocaleDateString('es-HN', {
    weekday:'long', day:'numeric', month:'long', year:'numeric'
  });
  const tipoIcono = p.meeting_types?.icono || '⛪';
  const tipoNombre = p.meeting_types?.nombre || p.tipo_reunion;

  const tareasHTML = (tasks||[]).length === 0
    ? '<p class="text-white/80 text-center italic text-sm">Sin tareas asignadas</p>'
    : (tasks||[]).map(t => `
        <div class="bg-white/10 backdrop-blur rounded-xl p-3 flex items-center justify-between gap-2">
          <div class="min-w-0">
            <div class="font-semibold text-white text-sm">${t.nombre_tarea}</div>
            <div class="text-xs text-white/80">${t.members?.nombre || 'Sin asignar'}</div>
          </div>
          <div class="text-xl">${t.estado==='completado'?'✓':t.estado==='en_proceso'?'◐':'○'}</div>
        </div>
      `).join('');

  const dataCompartir = JSON.stringify({
    fecha: fechaFormato, tipo: tipoNombre, tema: p.tema, pred: p.predicador,
    tasks: (tasks||[]).map(t => ({ n: t.nombre_tarea, r: t.members?.nombre }))
  }).replace(/"/g, '&quot;');

  UI.openModal('modalResumen', `
    <div id="flyerContainer" class="p-0 overflow-hidden">
      <div id="flyer" class="flyer text-white p-6 sm:p-8">
        <div class="text-center mb-4">
          <div class="text-xs uppercase tracking-widest opacity-80 mb-1">Iglesia ADULAM</div>
          <div class="text-4xl mb-2">${tipoIcono}</div>
          <h2 class="text-2xl sm:text-3xl font-bold leading-tight">${tipoNombre}</h2>
          <p class="text-base sm:text-lg mt-1 capitalize">${fechaFormato}</p>
        </div>
        ${p.tema ? `
          <div class="bg-white/15 rounded-xl p-3 text-center mb-4">
            <div class="text-xs uppercase opacity-80">Tema</div>
            <div class="text-lg font-semibold">${p.tema}</div>
          </div>` : ''}
        ${p.predicador ? `
          <div class="text-center mb-4">
            <div class="text-xs uppercase opacity-80">Ministra</div>
            <div class="text-base font-semibold">${p.predicador}</div>
          </div>` : ''}
        <div class="border-t border-white/20 pt-4">
          <div class="text-xs uppercase tracking-wider opacity-80 mb-3 text-center">Organización</div>
          <div class="space-y-2">${tareasHTML}</div>
        </div>
        <div class="text-center mt-5 text-xs opacity-70">Compartido desde ADULAM</div>
      </div>
    </div>
    <div class="p-4 flex flex-col sm:flex-row gap-2 bg-slate-100 no-print">
      <button onclick="descargarImagen()" class="flex-1 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-semibold flex items-center justify-center gap-2">
        <i data-lucide="download" class="w-4 h-4"></i>Descargar imagen
      </button>
      <button onclick='copiarTexto(${dataCompartir})' class="flex-1 py-3 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl font-semibold flex items-center justify-center gap-2">
        <i data-lucide="clipboard" class="w-4 h-4"></i>Copiar texto
      </button>
      <button onclick="UI.closeModal('modalResumen')" class="py-3 px-6 bg-slate-300 rounded-xl">Cerrar</button>
    </div>
  `);
}

async function descargarImagen() {
  UI.toast('Generando...', 'info');
  try {
    if (!window.html2canvas) {
      await new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
        s.onload = resolve; s.onerror = reject;
        document.head.appendChild(s);
      });
    }
    const flyer = document.getElementById('flyer');
    const canvas = await html2canvas(flyer, { scale: 2, backgroundColor: null, useCORS: true });
    canvas.toBlob((blob) => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `servicio-adulam-${new Date().toISOString().slice(0,10)}.png`;
      a.click();
      URL.revokeObjectURL(url);
      UI.toast('Imagen descargada','success');
    });
  } catch (err) {
    UI.toast('Error: ' + err.message, 'error');
  }
}

function copiarTexto(data) {
  if (typeof data === 'string') { try { data = JSON.parse(data); } catch(e){} }
  let texto = `*IGLESIA ADULAM*\n\n`;
  texto += `📅 *${data.fecha}*\n`;
  texto += `⛪ ${data.tipo}\n`;
  if (data.tema) texto += `\nTema: *${data.tema}*\n`;
  if (data.pred) texto += `Ministra: ${data.pred}\n`;
  texto += `\n*Organización del servicio:*\n`;
  (data.tasks||[]).forEach(t => { texto += `• ${t.n}: ${t.r || 'sin asignar'}\n`; });
  texto += `\n_Bendiciones. Te esperamos!_`;

  navigator.clipboard.writeText(texto).then(() => {
    UI.toast('Texto copiado','success');
  }).catch(() => prompt('Copia manualmente:', texto));
}

async function gestionarTipos() {
  const { data } = await supabase.from('meeting_types').select('*').order('orden');
  const filas = (data||[]).map(t => `
    <div class="flex items-center gap-2 p-2 border-b border-slate-100 last:border-0">
      <span class="text-xl">${t.icono}</span>
      <div class="flex-1 min-w-0">
        <div class="font-medium text-sm">${t.nombre}</div>
        <div class="text-xs text-slate-400">${t.codigo}</div>
      </div>
      <button onclick="eliminarTipo('${t.id}','${t.nombre.replace(/'/g,"\\'")}')" class="p-1.5 text-red-600 hover:bg-red-100 rounded"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
    </div>
  `).join('');

  UI.openModal('mTipos', `
    <div class="sticky top-0 bg-white border-b border-slate-200 p-4 flex items-center justify-between z-10">
      <h3 class="text-lg font-bold">Tipos de reunión</h3>
      <button onclick="UI.closeModal('mTipos')" class="p-2 hover:bg-slate-100 rounded-lg"><i data-lucide="x" class="w-5 h-5"></i></button>
    </div>
    <div class="p-4">
      <div class="bg-slate-50 rounded-xl mb-4 overflow-hidden">${filas}</div>
      <form id="ntForm" class="space-y-2 border-t border-slate-200 pt-4">
        <h4 class="font-semibold text-sm">Agregar tipo</h4>
        <div class="grid grid-cols-4 gap-2">
          <input name="icono" placeholder="🎉" maxlength="3" class="px-3 py-2.5 border border-slate-300 rounded-lg text-center text-xl">
          <input name="nombre" required placeholder="Vigilia" class="col-span-3 px-3 py-2.5 border border-slate-300 rounded-lg">
        </div>
        <input name="codigo" required placeholder="codigo_unico" class="w-full px-3 py-2.5 border border-slate-300 rounded-lg text-sm">
        <button type="submit" class="w-full py-3 bg-amber-600 hover:bg-amber-700 text-white rounded-xl font-semibold flex items-center justify-center gap-2">
          <i data-lucide="plus" class="w-4 h-4"></i>Agregar tipo
        </button>
      </form>
    </div>
  `);

  document.getElementById('ntForm').onsubmit = async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const codigo = (fd.get('codigo')||'').toLowerCase().replace(/[^a-z0-9_]/g,'_');
    const { error } = await supabase.from('meeting_types').insert({
      codigo, nombre: fd.get('nombre'),
      icono: fd.get('icono') || '⛪', orden: 99
    });
    if (error) UI.toast(error.message,'error');
    else {
      UI.toast('Tipo agregado','success');
      const { data: tipos } = await supabase.from('meeting_types').select('*').eq('activo',true).order('orden');
      tiposCache = tipos || [];
      gestionarTipos();
    }
  };
}

async function eliminarTipo(id, nombre) {
  if (!confirm(`¿Eliminar tipo "${nombre}"?`)) return;
  const { error } = await supabase.from('meeting_types').delete().eq('id', id);
  if (error) UI.toast(error.message,'error');
  else { UI.toast('Eliminado','success'); gestionarTipos(); }
}

window.nuevoPlan = nuevoPlan;
window.agregarTarea = agregarTarea;
window.cambiarEstado = cambiarEstado;
window.eliminarTarea = eliminarTarea;
window.eliminarPlan = eliminarPlan;
window.verResumen = verResumen;
window.descargarImagen = descargarImagen;
window.copiarTexto = copiarTexto;
window.gestionarTipos = gestionarTipos;
window.eliminarTipo = eliminarTipo;
</script>
</body>
</html>
